<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의집 Trend Radar</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #111; }

  /* 상단 바 */
  .topbar {
    display: flex; align-items: center; padding: 0 20px; height: 48px;
    border-bottom: 1px solid #E5E7EB; background: #fff; position: sticky; top: 0; z-index: 10;
  }
  .logo { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 500; }
  .logo-dot { width: 20px; height: 20px; background: #00C4B4; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
  .logo-dot svg { width: 12px; height: 12px; }
  .logo-accent { color: #00C4B4; margin-left: 2px; }
  .topbar-divider { width: 1px; height: 20px; background: #E5E7EB; margin: 0 16px; }
  .topbar-title { font-size: 13px; color: #6B7280; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .badge-auto {
    display: flex; align-items: center; gap: 5px; font-size: 12px;
    padding: 4px 10px; border-radius: 20px; background: #E6F9F7; color: #0D7A6E; border: 1px solid #9FE1D0;
  }
  .badge-auto::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #00C4B4; display: inline-block; }
  .btn-generate {
    font-size: 12px; padding: 5px 14px; border-radius: 20px; background: #3B82F6;
    color: #fff; border: none; cursor: pointer; display: flex; align-items: center; gap: 5px; font-weight: 500;
  }
  .btn-generate:hover { background: #2563EB; }
  .btn-generate:disabled { background: #93C5FD; cursor: not-allowed; }
  .btn-generate svg { width: 13px; height: 13px; }

  /* 레이아웃 */
  .main { display: flex; height: calc(100vh - 48px); }

  /* 사이드바 */
  .sidebar { width: 200px; flex-shrink: 0; border-right: 1px solid #E5E7EB; background: #FAFAFA; overflow-y: auto; }
  .sidebar-header {
    padding: 14px 16px 8px; font-size: 11px; color: #9CA3AF; font-weight: 500;
    display: flex; align-items: center; gap: 6px; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .sidebar-header svg { width: 13px; height: 13px; }
  .sidebar-empty { padding: 14px 16px; font-size: 12px; color: #9CA3AF; line-height: 1.7; }
  .sidebar-item {
    padding: 8px 16px; font-size: 13px; cursor: pointer; color: #6B7280;
    border-left: 2px solid transparent; display: flex; align-items: flex-start; gap: 8px; line-height: 1.3;
  }
  .sidebar-item:hover { background: #F0F0F0; color: #111; }
  .sidebar-item.active { background: #EFF6FF; color: #1D4ED8; border-left: 2px solid #3B82F6; font-weight: 500; }
  .sidebar-item .dot { width: 6px; height: 6px; border-radius: 50%; background: #D1D5DB; flex-shrink: 0; margin-top: 4px; }
  .sidebar-item.active .dot { background: #3B82F6; }
  .week-label { font-size: 11px; opacity: 0.7; margin-top: 2px; }

  /* 콘텐츠 */
  .content { flex: 1; overflow-y: auto; padding: 28px 36px; }
  .content-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; height: 100%; min-height: 400px;
  }
  .empty-title { font-size: 15px; font-weight: 500; }
  .empty-sub { font-size: 13px; color: #9CA3AF; text-align: center; line-height: 1.7; }
  .empty-sub span { color: #3B82F6; font-weight: 500; }

  /* 리포트 */
  .report-header { margin-bottom: 24px; padding-bottom: 18px; border-bottom: 1px solid #E5E7EB; }
  .report-title { font-size: 20px; font-weight: 500; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .report-meta { font-size: 12px; color: #9CA3AF; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .report-meta span { display: flex; align-items: center; gap: 4px; }
  .badge-shared { color: #15803D; background: #F0FDF4; padding: 2px 8px; border-radius: 10px; font-size: 11px; }

  /* 테마 */
  .theme-section { margin-bottom: 28px; }
  .theme-label {
    display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500;
    padding: 4px 12px; border-radius: 20px; margin-bottom: 14px;
  }
  .theme-interior { background: #EFF6FF; color: #1D4ED8; }
  .theme-marketing { background: #FFF7ED; color: #C2410C; }
  .theme-lifestyle { background: #F0FDF4; color: #15803D; }
  .theme-commerce { background: #FDF4FF; color: #7E22CE; }

  /* 기사 카드 */
  .article-card {
    padding: 14px 16px; border: 1px solid #E5E7EB; border-radius: 10px;
    margin-bottom: 10px; background: #fff; transition: border-color 0.15s, background 0.15s;
  }
  .article-card:hover { border-color: #D1D5DB; background: #FAFAFA; }
  .article-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
  .article-title { font-size: 13px; font-weight: 500; color: #1D4ED8; text-decoration: none; line-height: 1.4; flex: 1; }
  .article-title:hover { text-decoration: underline; }
  .article-source { font-size: 11px; color: #9CA3AF; flex-shrink: 0; padding-top: 2px; white-space: nowrap; }
  .article-summary { font-size: 12px; color: #6B7280; line-height: 1.6; }

  /* 생성 중 */
  .generating { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 80px 0; }
  .spinner { width: 32px; height: 32px; border: 2px solid #E5E7EB; border-top: 2px solid #3B82F6; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .gen-steps { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
  .gen-step { font-size: 12px; color: #9CA3AF; display: flex; align-items: center; gap: 6px; }
  .gen-step svg { width: 13px; height: 13px; flex-shrink: 0; }
  .gen-step.active { color: #3B82F6; }
  .gen-step.done { color: #15803D; }

  /* 토스트 */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1F2937; color: #fff; font-size: 12px; padding: 9px 18px;
    border-radius: 20px; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 999;
  }
  .toast.show { opacity: 1; }

  /* 모달 */
  .modal-wrap {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.25); z-index: 100; align-items: center; justify-content: center;
  }
  .modal-wrap.open { display: flex; }
  .modal-box {
    background: #fff; border-radius: 12px; border: 1px solid #E5E7EB;
    padding: 24px; width: 340px; box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .modal-box h3 { font-size: 15px; font-weight: 500; margin-bottom: 6px; }
  .modal-box p { font-size: 12px; color: #6B7280; margin-bottom: 14px; line-height: 1.6; }
  .modal-box input {
    width: 100%; font-size: 13px; padding: 8px 12px; border: 1px solid #D1D5DB;
    border-radius: 8px; margin-bottom: 12px; outline: none; font-family: monospace;
  }
  .modal-box input:focus { border-color: #3B82F6; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-cancel {
    font-size: 13px; padding: 6px 14px; border-radius: 8px;
    border: 1px solid #E5E7EB; background: #fff; cursor: pointer; color: #6B7280;
  }
  .btn-save {
    font-size: 13px; padding: 6px 14px; border-radius: 8px;
    border: none; background: #3B82F6; color: #fff; cursor: pointer; font-weight: 500;
  }
  .modal-input-group { margin-bottom: 12px; }
  .modal-input-group label { font-size: 12px; color: #6B7280; display: block; margin-bottom: 4px; }
  .modal-input-group input { margin-bottom: 0; }

  /* 설정 버튼 */
  .btn-settings {
    font-size: 12px; padding: 4px 12px; border-radius: 20px;
    border: 1px solid #E5E7EB; background: #fff; color: #6B7280; cursor: pointer;
    display: flex; align-items: center; gap: 4px;
  }
  .btn-settings:hover { background: #F9FAFB; }
  .btn-settings svg { width: 13px; height: 13px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-dot">
      <svg viewBox="0 0 12 12" fill="none"><path d="M6 2L10 6L6 10L2 6Z" fill="white"/></svg>
    </div>
    <span>오늘의집</span>
    <span class="logo-accent">Trend Radar</span>
  </div>
  <div class="topbar-divider"></div>
  <span class="topbar-title">트렌드 레이더 v2.0</span>
  <div class="topbar-right">
    <div class="badge-auto">매주 금요일 자동 업로드</div>
    <button class="btn-settings" id="btnSettings">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="8" cy="8" r="2.5"/><path d="M8 2v1.5M8 12.5V14M2 8h1.5M12.5 8H14M3.5 3.5l1 1M11.5 11.5l1 1M12.5 3.5l-1 1M4.5 11.5l-1 1"/>
      </svg>
      설정
    </button>
    <button class="btn-generate" id="btnGenerate">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M13 8A5 5 0 1 1 8 3"/><polyline points="13,3 13,8 8,8"/>
      </svg>
      지금 바로 생성
    </button>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M2 4h12v9a1 1 0 01-1 1H3a1 1 0 01-1-1V4z"/><path d="M5 4V3a1 1 0 011-1h4a1 1 0 011 1v1"/>
      </svg>
      리포트 아카이브
    </div>
    <div id="sidebarList">
      <div class="sidebar-empty">불러오는 중...</div>
    </div>
  </div>

  <div class="content" id="contentArea">
    <div class="content-empty" id="emptyState">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none" stroke="#D1D5DB" stroke-width="1.5">
        <circle cx="32" cy="32" r="28"/><circle cx="32" cy="32" r="18"/><circle cx="32" cy="32" r="8"/>
        <circle cx="32" cy="32" r="3" fill="#D1D5DB" stroke="none"/>
        <line x1="32" y1="4" x2="32" y2="60"/><line x1="4" y1="32" x2="60" y2="32"/>
      </svg>
      <p class="empty-title">트렌드 레이더</p>
      <p class="empty-sub">리포트를 선택하거나 새로 생성해주세요<br>상단의 <span>지금 바로 생성</span> 버튼을 눌러<br>첫 번째 리포트를 만들어보세요</p>
    </div>
    <div id="reportView" style="display:none"></div>
  </div>
</div>

<!-- 설정 모달 -->
<div class="modal-wrap" id="settingsModal">
  <div class="modal-box">
    <h3>설정</h3>
    <p>GitHub 레포 정보를 입력하면 "지금 바로 생성" 버튼이 GitHub Actions를 트리거합니다.<br>설정값은 이 브라우저에만 저장됩니다.</p>
    <div class="modal-input-group">
      <label>GitHub 사용자명 (예: yoonseo-kim)</label>
      <input type="text" id="inputOwner" placeholder="your-username" />
    </div>
    <div class="modal-input-group">
      <label>레포 이름 (예: ohouse-trend-radar)</label>
      <input type="text" id="inputRepo" placeholder="repo-name" />
    </div>
    <div class="modal-input-group" style="margin-bottom:16px">
      <label>GitHub Personal Access Token
        <a href="https://github.com/settings/tokens/new?scopes=repo,workflow" target="_blank"
           style="color:#3B82F6;font-size:11px;margin-left:4px">발급받기 →</a>
      </label>
      <input type="password" id="inputToken" placeholder="ghp_..." />
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" id="btnSettingsCancel">취소</button>
      <button class="btn-save" id="btnSettingsSave">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const REPORTS_URL = './reports/';
const SETTINGS_KEY = 'ohouse_radar_settings';

const themeConfig = {
  interior:  { label: '인테리어',     icon: '🪑', cls: 'theme-interior' },
  marketing: { label: '마케팅/트렌드', icon: '📌', cls: 'theme-marketing' },
  lifestyle: { label: '라이프스타일',  icon: '🏃', cls: 'theme-lifestyle' },
  commerce:  { label: '커머스',        icon: '🛍️', cls: 'theme-commerce' },
};
const themeOrder = ['interior', 'marketing', 'lifestyle', 'commerce'];

let reports = [];
let activeId = null;

function getSettings() {
  try { return JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}'); } catch(e) { return {}; }
}
function saveSettings(s) {
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); } catch(e) {}
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// GitHub Pages에서 reports/ 폴더의 index.json 읽기
async function loadReports() {
  try {
    const res = await fetch('./reports/index.json?t=' + Date.now());
    if (!res.ok) throw new Error('no index');
    const index = await res.json(); // [{ id, date, title, count }]
    reports = [];
    for (const meta of index) {
      try {
        const r = await fetch(`./reports/${meta.id}.json?t=` + Date.now());
        if (r.ok) reports.push(await r.json());
      } catch(e) {}
    }
    reports.sort((a, b) => new Date(b.date) - new Date(a.date));
  } catch(e) {
    reports = [];
  }
  renderSidebar();
  if (reports.length > 0) {
    activeId = reports[0].id;
    renderSidebar();
    renderReport(reports[0]);
  }
}

function renderSidebar() {
  const list = document.getElementById('sidebarList');
  if (!reports.length) {
    list.innerHTML = '<div class="sidebar-empty">아직 생성된 리포트가 없습니다.<br>지금 바로 생성 버튼을 눌러 첫 번째 리포트를 만들어보세요.</div>';
    return;
  }
  list.innerHTML = reports.map(r => {
    const d = new Date(r.date);
    const isActive = r.id === activeId;
    return `<div class="sidebar-item${isActive ? ' active' : ''}" data-id="${r.id}">
      <div class="dot"></div>
      <div>
        <div>${d.getMonth()+1}월 ${d.getDate()}일 리포트</div>
        <div class="week-label">${r.items.length}건 수집</div>
      </div>
    </div>`;
  }).join('');
  list.querySelectorAll('.sidebar-item').forEach(el => {
    el.addEventListener('click', () => {
      activeId = el.dataset.id;
      renderSidebar();
      renderReport(reports.find(r => r.id === activeId));
    });
  });
}

function renderReport(report) {
  document.getElementById('emptyState').style.display = 'none';
  const view = document.getElementById('reportView');
  view.style.display = 'block';
  const d = new Date(report.date);

  let html = `<div class="report-header">
    <div class="report-title">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#3B82F6" stroke-width="1.5">
        <circle cx="9" cy="9" r="7"/><circle cx="9" cy="9" r="4"/>
        <circle cx="9" cy="9" r="1.5" fill="#3B82F6" stroke="none"/>
      </svg>
      ${report.title} 📡
    </div>
    <div class="report-meta">
      <span>
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="3" width="12" height="11" rx="1.5"/><path d="M5 2v2M11 2v2M2 7h12"/>
        </svg>
        ${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일
      </span>
      <span>
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M8 2l2 4 4.5.7-3.3 3.2.8 4.5L8 12l-4 2.4.8-4.5L1.5 6.7 6 6z"/>
        </svg>
        ${report.items.length}건 수집
      </span>
      <span class="badge-shared">✓ 팀 공유됨</span>
    </div>
  </div>`;

  themeOrder.forEach(theme => {
    const items = report.items.filter(i => i.theme === theme);
    if (!items.length) return;
    const cfg = themeConfig[theme];
    html += `<div class="theme-section">
      <div class="theme-label ${cfg.cls}">${cfg.icon} ${cfg.label}</div>
      ${items.map(item => `<div class="article-card">
        <div class="article-top">
          <a class="article-title" href="${item.url}" target="_blank" rel="noopener">${item.title}</a>
          <span class="article-source">출처: ${item.source}</span>
        </div>
        <div class="article-summary">* ${item.summary}</div>
      </div>`).join('')}
    </div>`;
  });

  view.innerHTML = html;
}

// GitHub Actions workflow_dispatch 트리거
async function triggerGenerate() {
  const s = getSettings();
  if (!s.owner || !s.repo || !s.token) {
    document.getElementById('settingsModal').classList.add('open');
    document.getElementById('inputOwner').setAttribute('data-pending', '1');
    return;
  }
  const btn = document.getElementById('btnGenerate');
  btn.disabled = true;
  btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" style="animation:spin 0.8s linear infinite"><path d="M13 8A5 5 0 1 1 8 3"/><polyline points="13,3 13,8 8,8"/></svg> 요청 중...`;

  try {
    const res = await fetch(
      `https://api.github.com/repos/${s.owner}/${s.repo}/actions/workflows/trend_report.yml/dispatches`,
      {
        method: 'POST',
        headers: {
          'Authorization': `token ${s.token}`,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ ref: 'main' })
      }
    );
    if (res.status === 204) {
      showToast('✓ 리포트 생성이 시작됐어요! 약 1~2분 후 새로고침하면 확인할 수 있어요.');
    } else {
      const err = await res.json().catch(() => ({}));
      showToast('오류: ' + (err.message || `HTTP ${res.status}. 설정을 확인해주세요.`));
    }
  } catch(e) {
    showToast('네트워크 오류가 발생했어요. 다시 시도해주세요.');
  }

  btn.disabled = false;
  btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M13 8A5 5 0 1 1 8 3"/><polyline points="13,3 13,8 8,8"/></svg> 지금 바로 생성`;
}

// 설정 모달
document.getElementById('btnSettings').addEventListener('click', () => {
  const s = getSettings();
  document.getElementById('inputOwner').value = s.owner || '';
  document.getElementById('inputRepo').value = s.repo || '';
  document.getElementById('inputToken').value = s.token || '';
  document.getElementById('settingsModal').classList.add('open');
});
document.getElementById('btnSettingsCancel').addEventListener('click', () => {
  document.getElementById('settingsModal').classList.remove('open');
});
document.getElementById('btnSettingsSave').addEventListener('click', () => {
  const s = {
    owner: document.getElementById('inputOwner').value.trim(),
    repo: document.getElementById('inputRepo').value.trim(),
    token: document.getElementById('inputToken').value.trim(),
  };
  saveSettings(s);
  const pending = document.getElementById('inputOwner').getAttribute('data-pending');
  document.getElementById('inputOwner').removeAttribute('data-pending');
  document.getElementById('settingsModal').classList.remove('open');
  showToast('설정이 저장됐어요');
  if (pending) triggerGenerate();
});

document.getElementById('btnGenerate').addEventListener('click', triggerGenerate);

loadReports();
</script>
</body>
</html>
